  # ══════════════════════════════════════════════════════════════════
  # TOOL INVOCATION EVAL — README scenario prompts → expected MCP tools
  # ══════════════════════════════════════════════════════════════════
  # Each case maps a natural-language prompt (from MSX or OIL README)
  # to the MCP tool(s) an agent should invoke. Format: "server:tool_name".
  # Evaluated by score-tool-routing.mjs against tool-catalog.yaml.

